<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: Arial; text-align: center; }
.item { margin: 15px; }
</style>
</head>

<body>

<h2>🍔 Food Menu</h2>

<a href="/cart">View Cart 🛒</a>

{% for item in items %}
<div class="item">
    <h3>{{ item[1] }}</h3>
    <p>Price: ₹{{ item[2] }}</p>
    <a href="/add/{{ item[0] }}">Add to Cart</a>
</div>
{% endfor %}

</body>
</html>
